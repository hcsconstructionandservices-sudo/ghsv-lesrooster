<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hondenschool Lesrooster</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="banner">
        <span id="banner-datetime" class="banner-datetime"></span>
        <span class="banner-logo"><img src="img/logo-ghsv.jpg" alt="GHSV Logo" /></span>
        <span id="banner-message"></span>
    </div>
    <div class="menu-floating">
        <button id="menu-toggle" class="menu-toggle" type="button" aria-expanded="false" aria-controls="quick-menu">Menu</button>
        <div id="quick-menu" class="quick-menu" hidden>
            <a class="menu-link" href="index.html">Home</a>
            <a class="menu-link" href="weekoverzicht.html">Weekoverzicht</a>
            <a class="menu-link" href="lesmateriaal.html">Lesmateriaal</a>
            <button id="menu-refresh" type="button">Ververs rooster</button>
            <button id="menu-show-ad" type="button">Toon advertentie nu</button>
            <button id="menu-hide-ad" type="button">Sluit advertentie</button>
        </div>
    </div>
    <div class="qr-fixed">
        <img id="qr-code" src="" alt="QR-code inschrijven" />
        <div class="qr-label">Inschrijven</div>
    </div>
    <main class="lesson-main">
        <section id="current-lesson" class="lesson-section">
            <h2>Deze lessen zijn nu bezig</h2>
            <div id="current-lesson-content"></div>
        </section>
        <section id="upcoming-lessons" class="lesson-section">
            <h2>Komende Lessen</h2>
            <div id="upcoming-lessons-content"></div>
        </section>
    </main>
    <div id="ad-overlay" class="ad-overlay" style="display:none;">
        <img id="ad-image" src="" alt="Reclame" style="display:none;" />
        <video id="ad-video" style="display:none;" controls autoplay muted></video>
    </div>
    <script src="script.js"></script>
</body>
</html>
