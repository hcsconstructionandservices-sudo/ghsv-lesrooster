<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHSV Promotie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="ngm-fullscreen-page">
    <div class="banner">
        <span class="banner-datetime">GHSV Harderwijk</span>
        <span class="banner-logo"><img src="img/logo-ghsv.jpg" alt="GHSV Logo"></span>
        <span id="banner-message">GHSV Promotie</span>
    </div>

    <div class="menu-floating">
        <button id="menu-toggle" class="menu-toggle" type="button" aria-expanded="false" aria-controls="quick-menu">Menu</button>
        <div id="quick-menu" class="quick-menu" hidden>
            <a class="menu-link" href="index.html">Home</a>
            <a class="menu-link" href="rooster.html">Lesrooster</a>
            <a class="menu-link" href="weekoverzicht.html">Weekoverzicht</a>
            <a class="menu-link" href="lesmateriaal.html">Lesmateriaal</a>
            <a class="menu-link" href="ngm-cafe.html">NGM-Cafe</a>
            <a class="menu-link" href="media.html">Media</a>
            <a class="menu-link" href="galerij.html">Galerij</a>
            <a class="menu-link" href="promotie.html">Promotie</a>
            <a class="menu-link" href="promotie-beheer.html">Promotie Beheer</a>
        </div>
    </div>

    <main class="ngm-main">
        <section class="ngm-card">
            <h1>GHSV Promotiepagina</h1>
            <p>Doorlopende afspeellijst uit promotie-media.json. Ondersteunt lokale media uit img en externe links.</p>
            <div id="promo-stage" class="ngm-ad-stage">
                <img id="promo-image" alt="Promotie afbeelding" hidden>
                <video id="promo-video" muted autoplay playsinline controls hidden></video>
                <iframe id="promo-iframe" title="Promotie webvideo" allow="autoplay; encrypted-media; picture-in-picture" referrerpolicy="strict-origin-when-cross-origin" hidden></iframe>
                <div id="promo-empty" class="ngm-ad-empty">Promotie wordt geladen...</div>
            </div>
        </section>
    </main>

    <script src="menu.js"></script>
    <script src="promotie.js"></script>
</body>
</html>
